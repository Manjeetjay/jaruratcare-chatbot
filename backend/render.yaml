services:
  - type: web
    name: whatsapp-chatbot-backend
    env: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: whatsapp-chatbot-db
          property: connectionString
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: DATABASE_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect

databases:
  - name: whatsapp-chatbot-db
    databaseName: whatsappbotdb
    user: whatsappuser
    plan: free
